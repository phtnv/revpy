# Local server
HOST=127.0.0.1
PORT=5001

ANTHROPIC_API_KEY=your_anthropic_api_key
# The key that you actually put into JanitorAI. Can be anything
PROXY_KEY=key_you_write_in_janitor
REQUIRE_PROXY_KEY=true
ALLOW_KEY_PASSTHROUGH=false

# Default Claude model
MODEL=claude-sonnet-4-6

# Generation
MAX_TOKENS=8192
DEFAULT_TEMPERATURE=0.9
TEMPERATURE_OVERRIDE=-1
SEND_TOP_P=false
TOP_P=0.9
TOP_K=75

# Prompt cache
USE_CACHE=true
CACHE_SYSTEM=true
CACHE_SYSTEM_TTL=1h
SPLIT_LOREBOOK=true
CACHE_MANUAL_TTL=1h
CACHE_MANUAL_MSG=1
CACHE_AUTO_TTL=1h
CACHE_AUTO_MSG=3

# Optional assistant prefill. Blank by default.
ASSISTANT_PREFILL=""

# Behavior
AUTO_TRIM=true
DEBUG_LOG=true
ERROR_LOG_PATH=claudeerrorlog.txt

# PREFILL_MODE=assistant
PREFILL_MODE=none

# Thinking
THINKING_ENABLED=true
THINKING_BUDGET=2048
# low, medium, high, xhigh, max
THINKING_EFFORT=high
PRESERVE_THINKING_BLOCKS=0
