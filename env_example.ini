# Local server
HOST=127.0.0.1
PORT=5001

# Key you generate in Claude Console.
ANTHROPIC_API_KEY=your_anthropic_api_key
# The key that you actually put into JanitorAI. Can be anything.
PROXY_KEY=key_you_write_in_janitor
REQUIRE_PROXY_KEY=true
# Allow key from Janitor to be used for Claude.
ALLOW_KEY_PASSTHROUGH=false

# Default Claude model. Available model list is requested at start from Anthropic. Use 'm' in CLI to check it.
MODEL=claude-sonnet-4-6

# Generation
MAX_TOKENS=8192
DEFAULT_TEMPERATURE=0.9
TEMPERATURE_OVERRIDE=-1
SEND_TOP_P=false
TOP_P=0.9
TOP_K=75

# Cost tracking. Prices in USD per 1 million tokens.
OPUS_INPUT_TOKEN_COST_USD=5.00
OPUS_OUTPUT_TOKEN_COST_USD=25.00
OPUS_CACHE_WRITE_5M_COST_USD=6.25
OPUS_CACHE_WRITE_1H_COST_USD=10.00
OPUS_CACHE_READ_COST_USD=0.50
SONNET_INPUT_TOKEN_COST_USD=3.00
SONNET_OUTPUT_TOKEN_COST_USD=15.00
SONNET_CACHE_WRITE_5M_COST_USD=3.75
SONNET_CACHE_WRITE_1H_COST_USD=6.00
SONNET_CACHE_READ_COST_USD=0.30
HAIKU_INPUT_TOKEN_COST_USD=1.00
HAIKU_OUTPUT_TOKEN_COST_USD=5.00
HAIKU_CACHE_WRITE_5M_COST_USD=1.25
HAIKU_CACHE_WRITE_1H_COST_USD=2.00
HAIKU_CACHE_READ_COST_USD=0.10

# Caching
# Enable / Disable all caching.
CACHE_EN=true
# Cache system message.
CACHE_SYSTEM=true
CACHE_SYSTEM_TTL=1h
# Split system message into core definitions + lorebook, with an individual cache marker on each.
# See `split_system_prompt_into_text_blocks` in `server.py` for more info.
SPLIT_LOREBOOK=true
# Manual cache marker placed CACHE_MANUAL_MSG from the start.
# 1 - first message of the chat (the intro). 0 to disable.
# Note that because LLMs expect user+assistant message pairs starting from user, chat agents (like Janitor) often send
# a fake user message at start (Janitor sends '.' as the first user message). This fake message is not counted.
CACHE_MANUAL_MSG=1
CACHE_MANUAL_TTL=1h
# Auto cache marker placed from CACHE_AUTO_MSG from the end.
# 1 - last user message. 0 to disable.
CACHE_AUTO_MSG=3
CACHE_AUTO_TTL=1h
# Anthropic auto-caching. Automatically caches the last message.
CACHE_ANTHROPIC_AUTO=false
CACHE_ANTHROPIC_TTL=1h

# Prefill
# none        - Disable prefill.
# assistant   - Append prefill as the last assistant message. Not compatible with thinking and Mythos (>=4.6) models.
# instruction - Append prefill as an OOC command at the end of last user message.
PREFILL_MODE=none
ASSISTANT_PREFILL=""

# Behavior
AUTO_TRIM=true
# Enables replacing <summary_block_beg>/<summary_block_end> ranges with the summary text.
# When false, summary control messages are stripped but original conversation messages are kept.
SUMMARY_BLOCKS_ENABLED=true
DEBUG_LOG=true
ERROR_LOG_PATH=claude_error_log.txt

# Thinking
THINKING_ENABLED=true
# Budget is used for older (<=4.5) models. Modern ones prefer (or support only) effort.
THINKING_BUDGET=2048
# low, medium, high, xhigh, max
THINKING_EFFORT=high
PRESERVE_THINKING_BLOCKS=0
