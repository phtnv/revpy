# Local server
HOST=127.0.0.1
PORT=5001

ANTHROPIC_API_KEY=your_anthropic_api_key
# The key that you actually put into JanitorAI. Can be anything
PROXY_KEY=key_you_write_in_janitor
REQUIRE_PROXY_KEY=true
ALLOW_KEY_PASSTHROUGH=false

# Default Claude model
MODEL=claude-sonnet-4-6

# Generation
MAX_TOKENS=8192
DEFAULT_TEMPERATURE=0.9
TEMPERATURE_OVERRIDE=-1
SEND_TOP_P=false
TOP_P=0.9
TOP_K=75

# Caching
CACHE_EN=true
CACHE_SYSTEM=true
CACHE_SYSTEM_TTL=1h
SPLIT_LOREBOOK=true
# Anthropic auto-caching. Automatically caches the last message
CACHE_ANTHROPIC_AUTO=false
CACHE_ANTHROPIC_TTL=1h
# Manual cache marker placed CACHE_MANUAL_MSG from the start.
# If set to 1 will place it at the first message of the chat (the intro).
# Note that because LLM's expects user+assistant message pairs starting from user, a fake user
# message is sent at the very start. That message does not count.
CACHE_MANUAL_TTL=1h
CACHE_MANUAL_MSG=1
# Auto cache marker placed from CACHE_AUTO_MSG from the end.
# Setting it to 1 will place it at the last user message.
CACHE_AUTO_TTL=1h
CACHE_AUTO_MSG=3

# Prefill
# none        - Disable prefill.
# assistant   - Append prefill as the last assistant message. Not compatible with thinking and Mythos
#               (>=4.6) models.
# instruction - Append prefill as an OOC command at the end of last user message.
PREFILL_MODE=none
ASSISTANT_PREFILL=""

# Behavior
AUTO_TRIM=true
DEBUG_LOG=true
ERROR_LOG_PATH=claude_error_log.txt

# Thinking
THINKING_ENABLED=true
THINKING_BUDGET=2048
# low, medium, high, xhigh, max
THINKING_EFFORT=high
PRESERVE_THINKING_BLOCKS=0
